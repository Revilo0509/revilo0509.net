services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
                - USER_ID=${USER_ID}
                - GUILD_ID=${GUILD_ID}
        ports:
            - '3001:3000'
        environment:
            - NODE_ENV=production
        restart: always
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
