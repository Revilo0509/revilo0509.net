version: '3.9'
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        ports:
            - '3002:3000'
        environment:
            - NODE_ENV=production
        restart: always
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
